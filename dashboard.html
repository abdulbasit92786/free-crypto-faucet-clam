<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DogeDrip Faucet Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #ffd700, #b8860b);
  margin: 0;
}

.container {
  max-width: 700px;
  margin: 30px auto;
  padding: 20px;
  background: #fff;
  border-radius: 20px;
}

h1 {
  text-align:center;
  color:#b8860b;
}

.ads-section {
  background:#f2f2f2;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
  text-align:center;
}

button, input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

button {
  background: gold;
  font-weight:bold;
}

#timer {
  font-size:18px;
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>💎 DogeDrip Faucet</h1>

<div>Your Balance: <span id="balance">0.00 DOGE</span></div>

<!-- Deposit -->
<input type="number" placeholder="Deposit amount">
<button onclick="deposit()">Deposit</button>

<!-- Withdraw -->
<input type="text" id="withdraw-address" placeholder="FaucetPay address">
<button onclick="withdraw()">Withdraw</button>

<!-- Ads -->
<div class="ads-section">Advertisement Top</div>
<div class="ads-section">Advertisement Middle</div>

<!-- Claim -->
<button id="claim-btn" onclick="claimReward()">Claim DOGE</button>

<div class="ads-section">
  Advertisement Before Claim
  
  <!-- 🔥 TIMER UNDER ADS -->
  <div id="timer"></div>
</div>

</div>

<script>

// Balance
let userBalance = 0;

// User
let currentUser = localStorage.getItem("user_email") || "user@example.com";

// ⏰ AUTO LOGOUT 10 MIN
setTimeout(()=>{
  alert("Session expired!");
  localStorage.removeItem("user_email");
  window.location.href = "index.html";
}, 10 * 60 * 1000);


// ❌ Deposit
function deposit(){
  alert("🚧 Coming Soon!");
}

// Withdraw
function withdraw(){
  let addr = document.getElementById("withdraw-address").value;
  if(!addr) return alert("Enter address");

  if(userBalance <= 0) return alert("No balance");

  alert("Withdraw Successful (Demo)");
  userBalance = 0;
  updateBalance();
}

// Update balance
function updateBalance(){
  document.getElementById("balance").innerText = userBalance.toFixed(2) + " DOGE";
}


// CLAIM SYSTEM
let lastClaimTime = localStorage.getItem("lastClaimTime") || 0;
let claimCooldown = 15 * 60 * 1000; // 15 min

// Check availability
function checkClaim(){
  let now = Date.now();
  let btn = document.getElementById("claim-btn");

  if(now - lastClaimTime >= claimCooldown){
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

checkClaim();


// Claim
function claimReward(){

  if(!localStorage.getItem("user_email")){
    alert("Login again!");
    location.href = "index.html";
    return;
  }

  let now = Date.now();

  // ⛔ Cooldown check
  if(now - lastClaimTime < claimCooldown){
    let sec = Math.ceil((claimCooldown - (now - lastClaimTime))/1000);
    alert("Wait " + sec + " seconds");
    return;
  }

  let btn = document.getElementById("claim-btn");
  let timer = document.getElementById("timer");

  btn.disabled = true;

  let time = 30;

  // 🔥 START 30 SEC TIMER (UNDER ADS)
  let interval = setInterval(()=>{
    timer.innerText = "Please wait " + time + " sec...";
    time--;

    if(time < 0){
      clearInterval(interval);

      // 🎉 GIVE REWARD
      let reward = 0.01;
      userBalance += reward;
      updateBalance();

      timer.innerText = "✅ Claim Successful!";

      // Save time
      lastClaimTime = Date.now();
      localStorage.setItem("lastClaimTime", lastClaimTime);

      checkClaim();
    }

  },1000);
}

</script>

</body>
</html>
