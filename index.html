<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doge Faucet</title>

<!-- Google reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* Header */
.header {
    text-align:center;
    padding:40px 20px;
    color:#fff;
}
.header h1 {
    font-size:32px;
}

/* Card */
.card {
    background:#1e1e1e;
    margin:-30px auto;
    width:90%;
    max-width:400px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    text-align:center;
    color:#fff;
}

/* List */
.list {
    text-align:left;
    margin:20px 0;
}
.list p {
    margin:8px 0;
}

/* Input */
input {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin:10px 0;
    background:#333;
    color:#fff;
}

/* Button */
.btn {
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#667eea,#00c6ff);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
}

.btn:hover {
    opacity:0.9;
}
</style>

</head>

<body>

<div class="header">
    <h1>💎 DogeDrip</h1>
    <p>Claim Free DOGE Rewards</p>
</div>

<div class="card">

    <h2>Free Doge Faucet</h2>

    <div class="list">
        <p>✅ Claim DOGE</p>
        <p>✅ Instant FaucetPay Withdraw</p>
        <p>✅ No Minimum Withdrawal</p>
        <p>✅ Claim Every 15 Seconds</p>
    </div>

    <!-- Email -->
    <input type="email" id="email" placeholder="Enter FaucetPay Email">

    <!-- REAL reCAPTCHA -->
    <div class="g-recaptcha" data-sitekey="6Ldido0sAAAAADyq-df1CXtWsD_Ro6wSC79giLIS"></div>

    <!-- Button -->
    <button class="btn" onclick="login()">🚀 Claim Free DOGE Now</button>

</div>

<script>
function login(){
    let email = document.getElementById("email").value;
    let recaptcha = grecaptcha.getResponse();

    if(email === "" || !email.includes("@")){
        alert("Please enter valid email");
        return;
    }

    if(recaptcha.length === 0){
        alert("Please verify you are not a robot");
        return;
    }

    // Save email
    localStorage.setItem("user_email", email);

    alert("Login Successful!");

    // Next page redirect (later)
    // window.location.href = "dashboard.html";
}
</script>

</body>
</html>
