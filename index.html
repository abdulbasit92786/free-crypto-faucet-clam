<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doge Faucet</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* Header */
.header {
    text-align:center;
    padding:40px 20px;
    color:#fff;
}
.header h1 {
    font-size:32px;
    margin:10px 0;
}

/* Card */
.card {
    background:#1e1e1e;
    margin:-30px auto;
    width:90%;
    max-width:400px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    text-align:center;
    color:#fff;
}

/* List */
.list {
    text-align:left;
    margin:20px 0;
}
.list p {
    margin:8px 0;
}

/* Input */
input {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin:10px 0;
    background:#333;
    color:#fff;
}

/* Button */
.btn {
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#667eea,#00c6ff);
    color:#fff;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

/* Stats */
.stats {
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    font-size:14px;
}
</style>

</head>

<body>

<div class="header">
    <h1>💎 DogeDrip</h1>
    <p>Claim Free DOGE Rewards</p>
</div>

<div class="card">

    <h2>Free Doge Faucet</h2>

    <div class="list">
        <p>✅ Claim DOGE</p>
        <p>✅ Instant FaucetPay Withdraw</p>
        <p>✅ No Minimum Withdrawal</p>
        <p>✅ Claim Every 15 Seconds</p>
    </div>

    <!-- Email -->
    <input type="email" placeholder="Enter FaucetPay Email" id="email">

    <!-- Fake Cloudflare Verification -->
    <div style="background:#fff;color:#000;padding:10px;border-radius:10px;margin-top:10px;">
        ✔ Verification Complete
    </div>

    <!-- Button -->
    <button class="btn" onclick="login()">🚀 Claim Free DOGE Now</button>

    <!-- Stats -->
    <div class="stats">
        <div>
            <p>Online</p>
            <strong>3482</strong>
        </div>
        <div>
            <p>Active Today</p>
            <strong>11405</strong>
        </div>
    </div>

</div>

<script>
function login(){
    let email = document.getElementById("email").value;

    if(email === "" || !email.includes("@")){
        alert("Enter valid email");
        return;
    }

    // Save email (temporary)
    localStorage.setItem("user_email", email);

    // Redirect (next page later)
    alert("Login Success! Dashboard coming next...");
}
</script>

</body>
</html>
